name: Deploy LeadForge

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: api
            path: apps/api
            dockerfile: Dockerfile.light
          - service: email-worker
            path: workers/email-worker
            dockerfile: Dockerfile.light
          - service: telegram-worker
            path: workers/telegram-worker
            dockerfile: Dockerfile.light
          - service: export-worker
            path: workers/export-worker
            dockerfile: Dockerfile.light
          - service: website-worker
            path: workers/website-worker
            dockerfile: Dockerfile.playwright
          - service: search-worker
            path: workers/search-worker
            dockerfile: Dockerfile.playwright
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: |
            SERVICE_PATH=${{ matrix.path }}
          push: true
          tags: ${{ env.IMAGE_BASE }}/${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/leadforge
            git pull origin main
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
